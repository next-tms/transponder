name: Push
on:
  push:
    branches:
      - main
jobs:
  checks:
    uses: ./.github/workflows/checks.yml
    secrets:
      BUNDLER_GITHUB_OAUTH_KEY: ${{ secrets.BUNDLER_GITHUB_OAUTH_KEY }}
  push:
    name: Push
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: ${{ secrets.FLY_API_TOKEN }} flyctl deploy --remote-only --build-arg BUNDLER_GITHUB_OAUTH_KEY="{{ secrets.BUNDLER_GITHUB_OAUTH_KEY }}"
