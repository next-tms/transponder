name: Checks
on:
  push:
    branches:
      - '**'
      - '!main'
  workflow_call:
    secrets:
      BUNDLER_GITHUB_OAUTH_KEY:
        required: true
env:
  BUNDLER_GITHUB_OAUTH_KEY: ${{ secrets.BUNDLER_GITHUB_OAUTH_KEY }}
  HANAMI_ENV: test
  RACK_ENV: test
jobs:
  syntax:
    name: Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
      - run: |
          gem install bundler
          bundle config github.com "$BUNDLER_GITHUB_OAUTH_KEY"
          bundle install --jobs 4 --retry 3
      - run: bundle exec rubocop --only Lint/Syntax
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
      - run: |
          gem install bundler
          bundle config github.com "$BUNDLER_GITHUB_OAUTH_KEY"
          bundle install --jobs 4 --retry 3
      - run: bundle exec rspec
